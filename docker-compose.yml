  #   image: timescale/timescaledb:latest-pg15
  #   container_name: crypto_postgres
  #   environment:
  #     - POSTGRES_USER=user
  #     - POSTGRES_PASSWORD=password
  #     - POSTGRES_DB=crypto_data
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - timescaledb_data:/var/lib/postgresql/data
  #   restart: unless-stopped
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U user -d crypto_data"]
  #     interval: 5s
  #     timeout: 5s
  #     retries: 5

  # ── Redis - Commented out for Production Redis ──
  # redis:
  #   image: redis:alpine
  #   container_name: crypto_redis
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis_data:/data
  #   command: redis-server --appendonly yes
  #   restart: unless-stopped

  # ── API Gateway (Web Service) ──
  api:
    build: .
    container_name: crypto_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped
    command: >
      gunicorn api_gateway:app
      --worker-class uvicorn.workers.UvicornWorker
      --workers 2
      --bind 0.0.0.0:8000
      --timeout 120
      --access-logfile -
      --error-logfile -

  # ── Ingestion Worker ──
  harvester:
    build: .
    container_name: crypto_harvester
    env_file:
      - .env
    restart: unless-stopped
    command: python ingestion_service.py

  # ── Analytics Worker ──
  cruncher:
    build: .
    container_name: crypto_cruncher
    env_file:
      - .env
    restart: unless-stopped
    command: python analytics_worker.py

volumes:
  timescaledb_data:
  redis_data: